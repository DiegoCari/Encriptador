<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" items="IE=edge">
	<meta name="viewport" items="width=device-width,initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="estilo.css">
	<title>Encriptador</title>
</head>
<body>


	<header >
		<img src="Logo.png" alt="logo de alura con la letra a" class="foto">
	</header>

	<main>

		<section>
			<textarea class="texto-incriptado" placeholder="Ingrese Texto" maxlength="150"></textarea>

			<div class="botones">
				<span>Solo minusculas, sin acentos y maximo 150 caracteres!</span>
				<button class="boton-encriptar" onclick="btnEncriptar()">Encriptar</button>
				<button class="boton-desencriptar" onclick="btnDesencriptar()">Desencriptar</button>
			</div>
		</section>


		<section>
			<textarea class="resultado-incriptado" readonly="" maxlength="250"></textarea>
			<button class="boton-copiar" onclick="copiar()">Copiar</button>			
		</section>

	</main>










<script type="text/javascript" src="codigo.js"></script>
</body>	
</html>
